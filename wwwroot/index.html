<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sheets Search</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #f7f7f5;
      --surface:     #ffffff;
      --border:      #e3e3e0;
      --border-2:    #c9c9c4;
      --text:        #1a1a18;
      --muted:       #6b6b67;
      --accent:      #2563eb;
      --accent-bg:   #eff4ff;
      --accent-bd:   #bfdbfe;
      --green:       #16a34a;
      --green-bg:    #f0fdf4;
      --green-bd:    #bbf7d0;
      --amber:       #b45309;
      --amber-bg:    #fffbeb;
      --amber-bd:    #fde68a;
      --tag-bg:      #f1f0ec;
      --mark-bg:     #fef08a;
      --danger:      #dc2626;
      --radius:      8px;
      --shadow:      0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.05);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .logo {
      font-weight: 600;
      font-size: 15px;
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--text);
    }
    .logo-icon { color: var(--accent); }
    .header-right { display: flex; align-items: center; gap: 8px; }

    /* ── Buttons ─────────────────────────────── */
    button {
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      padding: 6px 12px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: background .12s, border-color .12s;
    }
    button:hover  { background: var(--bg); border-color: var(--border-2); }
    button:active { transform: scale(.98); }
    button:disabled { opacity: .45; cursor: not-allowed; transform: none; }

    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: #1d4ed8; border-color: #1d4ed8; }

    /* ── Main ────────────────────────────────── */
    main { max-width: 860px; margin: 0 auto; padding: 28px 20px 80px; }

    /* ── Search input ────────────────────────── */
    .search-wrap {
      position: relative;
      margin-bottom: 16px;
    }
    .search-icon {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted); pointer-events: none;
    }
    #searchInput {
      width: 100%;
      padding: 12px 44px 12px 42px;
      font-size: 16px;
      font-family: inherit;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      color: var(--text);
      outline: none;
      box-shadow: var(--shadow);
      transition: border-color .15s, box-shadow .15s;
    }
    #searchInput:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37,99,235,.1);
    }
    .clear-btn {
      position: absolute; right: 10px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      padding: 4px; color: var(--muted);
      border-radius: 4px; display: none;
    }
    .clear-btn:hover { background: var(--tag-bg); }
    #searchInput:not(:placeholder-shown) ~ .clear-btn { display: flex; }

    /* ── Filter tabs ─────────────────────────── */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 16px;
    }
    .tab {
      padding: 5px 13px;
      font-size: 13px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      transition: all .12s;
    }
    .tab:hover  { border-color: var(--border-2); color: var(--text); }
    .tab.active {
      background: var(--accent-bg);
      border-color: var(--accent-bd);
      color: var(--accent);
      font-weight: 500;
    }

    /* ── Meta bar ────────────────────────────── */
    .meta-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 12px;
      min-height: 22px;
    }
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .6s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Results ─────────────────────────────── */
    #results { display: flex; flex-direction: column; gap: 10px; }

    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      box-shadow: var(--shadow);
      transition: border-color .12s;
    }
    .result-card:hover { border-color: var(--border-2); }

    .card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    /* Sheet type badge colour-coded by type */
    .badge {
      font-size: 11px;
      font-weight: 500;
      padding: 2px 9px;
      border-radius: 20px;
      border: 1px solid transparent;
    }
    .badge-product  { background: var(--accent-bg); color: var(--accent); border-color: var(--accent-bd); }
    .badge-customer { background: var(--green-bg);  color: var(--green);  border-color: var(--green-bd); }
    .badge-default  { background: var(--tag-bg);    color: var(--muted);  border-color: var(--border); }

    .sheet-label { font-size: 12px; color: var(--muted); }
    .row-num     { font-size: 12px; color: var(--muted); margin-left: auto; }

    .snippet {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 10px;
      padding: 6px 10px;
      background: var(--tag-bg);
      border-radius: 4px;
      border-left: 3px solid var(--accent);
      line-height: 1.5;
    }
    .snippet mark {
      background: var(--mark-bg);
      color: var(--text);
      border-radius: 2px;
      padding: 0 1px;
    }

    /* Product / Customer specific layouts */
    .data-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 6px 20px;
    }
    .data-field   { display: flex; flex-direction: column; gap: 1px; }
    .field-key    { font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
    .field-val    { font-size: 13px; color: var(--text); word-break: break-word; }
    .field-val.price { color: var(--green); font-weight: 500; }

    .pill {
      display: inline-block;
      font-size: 11px;
      padding: 1px 8px;
      border-radius: 20px;
      font-weight: 500;
    }
    .pill-active   { background: var(--green-bg);  color: var(--green);  border: 1px solid var(--green-bd); }
    .pill-inactive { background: var(--tag-bg);    color: var(--muted);  border: 1px solid var(--border); }

    /* ── Empty / error ───────────────────────── */
    .state-box {
      text-align: center;
      padding: 56px 20px;
      color: var(--muted);
    }
    .state-box .icon { font-size: 32px; margin-bottom: 10px; }
    .state-box h3 { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
    .state-box p  { font-size: 13px; }
    .state-box.error h3 { color: var(--danger); }

    /* ── Status panel ────────────────────────── */
    .panel-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.28);
      z-index: 20;
    }
    .panel-overlay.open { display: block; }
    .panel {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: 360px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      padding: 24px;
      overflow-y: auto;
      z-index: 21;
      transform: translateX(100%);
      transition: transform .2s ease;
    }
    .panel-overlay.open .panel { transform: translateX(0); }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .panel-header h2 { font-size: 15px; font-weight: 600; }
    .close-btn { background: none; border: none; font-size: 20px; color: var(--muted); padding: 0 2px; }

    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: var(--bg);
      border-radius: var(--radius);
      padding: 12px;
    }
    .stat-label { font-size: 11px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: .4px; }
    .stat-value { font-size: 22px; font-weight: 500; margin-top: 2px; }

    .sync-row {
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .sync-row:last-child { border-bottom: none; }
    .sync-row-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 3px;
    }
    .sync-row .name { font-size: 13px; font-weight: 500; }
    .sync-row .info { font-size: 12px; color: var(--muted); }

    /* ── Toast ───────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%);
      background: #1a1a18;
      color: #fff;
      padding: 10px 18px;
      border-radius: var(--radius);
      font-size: 13px;
      z-index: 99;
      box-shadow: 0 4px 12px rgba(0,0,0,.2);
      transition: opacity .3s;
    }

    @media (max-width: 600px) {
      .data-grid { grid-template-columns: 1fr 1fr; }
      .panel { width: 100%; }
      .stat-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <svg class="logo-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    Sheets Search
  </div>
  <div class="header-right">
    <button id="statusBtn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      Status
    </button>
    <button class="btn-primary" id="syncBtn">Sync now</button>
  </div>
</header>

<main>
  <div class="search-wrap">
    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="searchInput" type="search" placeholder="Search products, customers…" autocomplete="off" />
    <button class="clear-btn" id="clearBtn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
  </div>

  <div class="filter-bar">
    <button class="tab active" data-filter="all">All</button>
    <button class="tab" data-filter="Products">Products</button>
    <button class="tab" data-filter="Customers">Customers</button>
  </div>

  <div class="meta-bar">
    <span id="metaText">Type to search…</span>
    <div class="spinner" id="spinner"></div>
  </div>

  <div id="results"></div>
</main>

<!-- Status panel -->
<div class="panel-overlay" id="panelOverlay">
  <div class="panel">
    <div class="panel-header">
      <h2>Sync status</h2>
      <button class="close-btn" id="closePanel">×</button>
    </div>
    <div id="panelContent">
      <p style="font-size:13px;color:var(--muted)">Loading…</p>
    </div>
  </div>
</div>

<script>
  const $ = id => document.getElementById(id);
  let currentFilter = 'all';
  let lastQuery     = '';
  let allResults    = [];

  // ── Debounce ─────────────────────────────────
  function debounce(fn, ms) {
    let t;
    return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
  }

  // ── Filter tabs ───────────────────────────────
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentFilter = tab.dataset.filter;
      renderResults(allResults);
    });
  });

  // ── Search ────────────────────────────────────
  async function doSearch(q) {
    q = q.trim();
    if (q === lastQuery) return;
    lastQuery = q;

    if (q.length < 2) {
      allResults = [];
      $('results').innerHTML = '';
      $('metaText').textContent = q.length === 1 ? 'Keep typing…' : 'Type to search…';
      return;
    }

    $('spinner').style.display = 'block';
    $('metaText').textContent  = 'Searching…';

    try {
      const res  = await fetch(`/api/search?q=${encodeURIComponent(q)}&limit=100`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      allResults = data.results ?? [];
      renderResults(allResults);
    } catch (err) {
      $('spinner').style.display = 'none';
      $('metaText').textContent  = 'Error';
      $('results').innerHTML = `
        <div class="state-box error">
          <div class="icon">⚠️</div>
          <h3>Search failed</h3>
          <p>${esc(err.message)}</p>
        </div>`;
    }
  }

  function renderResults(results) {
    $('spinner').style.display = 'none';

    const filtered = currentFilter === 'all'
      ? results
      : results.filter(r => r.sheetName === currentFilter);

    $('metaText').textContent = filtered.length === 0
      ? (results.length === 0 ? 'No results' : `No results in "${currentFilter}"`)
      : `${filtered.length} result${filtered.length === 1 ? '' : 's'}`;

    if (filtered.length === 0) {
      $('results').innerHTML = `
        <div class="state-box">
          <div class="icon">🔍</div>
          <h3>No results${currentFilter !== 'all' ? ` in ${currentFilter}` : ''}</h3>
          <p>Try different keywords or trigger a sync to refresh the data.</p>
        </div>`;
      return;
    }

    $('results').innerHTML = filtered.map(renderCard).join('');
  }

  // ── Card rendering ────────────────────────────
  function renderCard(item) {
    const type = (item.sheetType || '').toLowerCase();
    return type === 'product'
      ? renderProductCard(item)
      : type === 'customer'
        ? renderCustomerCard(item)
        : renderGenericCard(item);
  }

  function renderProductCard(item) {
    const d = item.data;
    const price    = d.price    != null ? `$${Number(d.price).toFixed(2)}` : '—';
    const stock    = d.stockQty != null ? d.stockQty.toLocaleString()      : '—';
    const activePill = activeBadge(d.isActive);

    return `
      <div class="result-card">
        <div class="card-header">
          <span class="badge badge-product">Product</span>
          ${d.category ? `<span class="sheet-label">${esc(d.category)}</span>` : ''}
          ${activePill}
          <span class="row-num">row ${item.rowIndex + 1}</span>
        </div>
        ${item.snippet ? `<div class="snippet">${item.snippet}</div>` : ''}
        <div class="data-grid">
          ${field('Product ID', d.productId)}
          ${field('Name',       d.name)}
          ${field('SKU',        d.sku)}
          <div class="data-field">
            <span class="field-key">Price</span>
            <span class="field-val price">${price}</span>
          </div>
          ${field('Stock', stock)}
          ${field('Supplier', d.supplierName)}
          ${d.description ? field('Description', d.description) : ''}
        </div>
      </div>`;
  }

  function renderCustomerCard(item) {
    const d = item.data;
    const activePill = activeBadge(d.isActive);

    return `
      <div class="result-card">
        <div class="card-header">
          <span class="badge badge-customer">Customer</span>
          ${d.segment ? `<span class="sheet-label">${esc(d.segment)}</span>` : ''}
          ${activePill}
          <span class="row-num">row ${item.rowIndex + 1}</span>
        </div>
        ${item.snippet ? `<div class="snippet">${item.snippet}</div>` : ''}
        <div class="data-grid">
          ${field('Customer ID', d.customerId)}
          ${field('Name',        d.fullName)}
          ${field('Email',       d.email)}
          ${field('Phone',       d.phone)}
          ${field('Company',     d.company)}
          ${field('Region',      d.region)}
          ${field('Country',     d.country)}
          ${d.joinedAt ? field('Joined', new Date(d.joinedAt).toLocaleDateString()) : ''}
        </div>
      </div>`;
  }

  function renderGenericCard(item) {
    const fields = Object.entries(item.data || {})
      .filter(([, v]) => v != null && v !== '')
      .map(([k, v]) => field(k, String(v)))
      .join('');

    return `
      <div class="result-card">
        <div class="card-header">
          <span class="badge badge-default">${esc(item.sheetName)}</span>
          <span class="row-num">row ${item.rowIndex + 1}</span>
        </div>
        ${item.snippet ? `<div class="snippet">${item.snippet}</div>` : ''}
        <div class="data-grid">${fields}</div>
      </div>`;
  }

  function field(label, value) {
    if (value == null || value === '' || value === 'null') return '';
    return `
      <div class="data-field">
        <span class="field-key">${esc(label)}</span>
        <span class="field-val">${esc(String(value))}</span>
      </div>`;
  }

  function activeBadge(isActive) {
    if (isActive == null) return '';
    return isActive
      ? `<span class="pill pill-active">Active</span>`
      : `<span class="pill pill-inactive">Inactive</span>`;
  }

  // ── Sync ──────────────────────────────────────
  $('syncBtn').addEventListener('click', async () => {
    const btn = $('syncBtn');
    btn.disabled = true;
    btn.textContent = 'Syncing…';
    try {
      const res  = await fetch('/api/sync', { method: 'POST' });
      const data = await res.json();
      if (data.success) {
        showToast(`✓ Synced ${data.syncedSheets} sheet(s) — ${data.totalRows.toLocaleString()} rows`);
      } else {
        showToast(`⚠ Sync done with ${data.errors.length} error(s) — check logs`);
      }
    } catch {
      showToast('Sync failed — check server logs');
    } finally {
      btn.disabled    = false;
      btn.textContent = 'Sync now';
    }
  });

  // ── Status panel ──────────────────────────────
  $('statusBtn').addEventListener('click', () => {
    $('panelOverlay').classList.add('open');
    loadStatus();
  });
  $('closePanel').addEventListener('click',   () => $('panelOverlay').classList.remove('open'));
  $('panelOverlay').addEventListener('click', e  => {
    if (e.target === $('panelOverlay')) $('panelOverlay').classList.remove('open');
  });

  async function loadStatus() {
    $('panelContent').innerHTML = '<p style="font-size:13px;color:var(--muted)">Loading…</p>';
    try {
      const res  = await fetch('/api/sync/status');
      const data = await res.json();

      const productSheets  = data.sheets.filter(s => s.sheetType === 'Product');
      const customerSheets = data.sheets.filter(s => s.sheetType === 'Customer');
      const productRows    = productSheets.reduce((s, x) => s + x.rowsSynced, 0);
      const customerRows   = customerSheets.reduce((s, x) => s + x.rowsSynced, 0);

      const sheetRows = data.sheets.map(s => {
        const badgeClass = s.sheetType === 'Product'  ? 'badge-product'
                         : s.sheetType === 'Customer' ? 'badge-customer'
                         : 'badge-default';
        return `
          <div class="sync-row">
            <div class="sync-row-header">
              <span class="name">${esc(s.sheetName)}</span>
              <span class="badge ${badgeClass}">${esc(s.sheetType)}</span>
            </div>
            <div class="info">
              ${s.rowsSynced.toLocaleString()} rows &nbsp;·&nbsp;
              ${new Date(s.syncedAt).toLocaleString()}
            </div>
          </div>`;
      }).join('') || '<p style="font-size:13px;color:var(--muted)">No sheets synced yet.</p>';

      $('panelContent').innerHTML = `
        <div class="stat-grid">
          <div class="stat-card">
            <div class="stat-label">Total rows</div>
            <div class="stat-value">${data.totalRows.toLocaleString()}</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Sheets</div>
            <div class="stat-value">${data.sheets.length}</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Products</div>
            <div class="stat-value">${productRows.toLocaleString()}</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Customers</div>
            <div class="stat-value">${customerRows.toLocaleString()}</div>
          </div>
        </div>
        ${sheetRows}`;
    } catch {
      $('panelContent').innerHTML =
        '<p style="font-size:13px;color:var(--danger)">Could not load status.</p>';
    }
  }

  // ── Input wiring ──────────────────────────────
  $('searchInput').addEventListener('input',
    debounce(e => doSearch(e.target.value), 300));

  $('clearBtn').addEventListener('click', () => {
    $('searchInput').value = '';
    allResults = [];
    $('results').innerHTML = '';
    $('metaText').textContent = 'Type to search…';
    lastQuery = '';
    $('searchInput').focus();
  });

  // ── Toast ─────────────────────────────────────
  function showToast(msg) {
    const t = document.createElement('div');
    t.className   = 'toast';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => {
      t.style.opacity = '0';
      setTimeout(() => t.remove(), 300);
    }, 2800);
  }

  // ── Escape HTML ───────────────────────────────
  function esc(s) {
    return String(s ?? '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sheets Search</title>

    <!--  External CSS -->
    <link rel="stylesheet" href="/css/site.css" />
</head>

<body>

    <header>
        <strong>Sheets Search</strong>
        <button class="btn-primary" id="syncBtn">Sync</button>
    </header>

    <main>

        <!--  Search -->
        <div class="search-wrap">
            <input id="searchInput" placeholder="Enter phone number..." />
            <button class="btn-primary" id="searchBtn">Search</button>
        </div>

        <!--  FIXED: metaText must exist -->
        <div class="meta-bar" id="metaText">
            Enter phone number to search
        </div>

        <!--  Results Table -->
        <div id="resultsContainer" style="display:none;">
            <table class="result-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Phone</th>
                        <th>Treatment</th>
                        <th>Treatment Specialist</th>
                        <th>Amount</th>
                    </tr>
                </thead>
                <tbody id="resultsBody">
                    <!-- Initial state -->
                    <tr>
                        <td colspan="5" class="empty-row">
                            Enter phone number to search
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </main>

    <!--  External JS (IMPORTANT: at bottom) -->
    <script src="/js/search.js"></script>

</body>
</html>
